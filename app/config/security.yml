# To get started with security, check out the documentation:
# http://symfony.com/doc/current/book/security.html
security:

    firewalls:
        allow:
            pattern:   ^/(login|connect/google|register)$
            anonymous: ~
        secured:
            pattern: ^/(?!(_(profiler|wdt)|css|images|js))
            form_login:
                login_path: /login
                use_referer: false
            logout:
                path: /logout
                invalidate_session: true
            provider: docs_user_provider
            auth:
                setPathToAuthenticate: "/loginCheck" # i know there are other ways to do this too
            oauth:
                resource_owners:
                    google: "/login/check-google"
                login_path: /login
                failure_path: /login
                oauth_user_provider:
                    service: docs_user_provider

    providers:
        docs_user_provider:
            id: docs_user_provider

    encoders:
        Docs\AuthBundle\Security\Authentication\SecurityUser:
            algorithm: bcrypt
            cost: 10

    access_control:
        - { path: ^/login, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/login_oauth, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/connect, role: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/register, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/ }
